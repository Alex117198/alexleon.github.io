<!DOCTYPE html>
<html>
<head>
<title>Alex G. León Valero - Game Developer</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: url("https://images.unsplash.com/photo-1507924538820-ede94a04019d") no-repeat center center/cover;
    color: white;
    margin:0;
    padding:0;
    text-align:center;
}

/* CONTENEDOR */

.container{
    width:80%;
    margin:auto;
    padding:40px;
    background: rgba(0,0,0,0.75);
    border-radius:12px;
    margin-top:40px;
}

/* TITULOS */

h1{
    font-size:42px;
    margin-bottom:10px;
}

h2{
    margin-top:40px;
    color:#d4af37; /* dorado */
}

/* TARJETAS */

.card{
    background:#2b0f0f;
    padding:20px;
    margin:20px auto;
    border-radius:10px;
    width:320px;
    border:2px solid #d4af37;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}
    
.skills{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-top:20px;
}

.skill{
    background:#2b0f0f;
    border:2px solid #d4af37;
    padding:10px 18px;
    border-radius:20px;
    font-weight:bold;
    transition:0.3s;
    cursor:default;
}

.skill:hover{
    background:#8b0000;
    transform:scale(1.1);
    box-shadow:0 0 10px rgba(212,175,55,0.8);
}
    
/* BOTONES */

.button{
    text-decoration:none;
    color:white;
    background:#8b0000;
    padding:10px 20px;
    border-radius:6px;
    display:inline-block;
    margin-top:10px;
    border:1px solid #d4af37;
    transition:0.3s;
}

.button:hover{
    background:#b22222;
    transform:scale(1.05);
}

/* REDES */

.social{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}

.disabled{
    background:#444;
    color:#bbb;
    padding:10px 20px;
    border-radius:6px;
}

/* LISTAS */

ul{
    list-style:none;
    padding:0;
}

/* TELON */

.curtain{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:flex;
    z-index:9999;
}

.curtain-left,
.curtain-right{
    width:50%;
    height:100%;
    background:linear-gradient(to right,#5a0000,#8b0000);
    transition:transform 2s ease;
}

.curtain-left{
    transform-origin:left;
}

.curtain-right{
    transform-origin:right;
}

/* APERTURA */

.open .curtain-left{
    transform:translateX(-100%);
}

.open .curtain-right{
    transform:translateX(100%);
}

</style>

</head>

<body>

<!-- TELON -->

<div class="curtain" id="curtain">
<div class="curtain-left"></div>
<div class="curtain-right"></div>
</div>

<div class="container">

<h1>Alex Valero</h1>

<p>Ingeniero de sistemas y desarrollador de videojuegos usando Unity, C# y .NET.</p>

<h2>Proyectos</h2>

<div class="card">

<h3>Skelly Scape</h3>

<p>Juego desarrollado en Unity.</p>

<a class="button" href="https://alexvalero.itch.io/skelly-scape" target="_blank">
Jugar en Itch.io
</a>

</div>

<h2>Habilidades</h2>

<div class="skills">

<span class="skill">Unity</span>
<span class="skill">C#</span>
<span class="skill">.NET</span>
<span class="skill">SQL</span>

</div>

<h2>Redes</h2>

<div class="social">

<a class="button" href="https://github.com/Alex117198" target="_blank">
GitHub
</a>

<a class="button" href="https://www.linkedin.com/in/alex-leon-a84a68233/" target="_blank">
LinkedIn
</a>

<a class="button" href="https://alexvalero.itch.io/" target="_blank">
Itch.io
</a>

<span class="disabled">
Instagram (Disabled for now)
</span>

</div>

<h2>Contacto</h2>

<p>Email: alye198@hotmail.com</p>

</div>

<script>

/* ABRIR TELON */

window.onload = function(){

setTimeout(function(){

document.body.classList.add("open");

},500);

/* quitar telon para que no bloquee clics */

setTimeout(function(){

document.getElementById("curtain").style.display="none";

},2500);

};

</script>

</body>
</html>
